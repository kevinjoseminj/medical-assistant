name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/medical-assistant
            git pull origin main
            /home/ubuntu/.local/bin/uv sync

            sudo cp deploy/medassist-backend.service /etc/systemd/system/medassist-backend.service
            sudo cp deploy/medassist-frontend.service /etc/systemd/system/medassist-frontend.service
            sudo cp deploy/nginx.conf /etc/nginx/sites-available/medassist
            sudo ln -sf /etc/nginx/sites-available/medassist /etc/nginx/sites-enabled/medassist
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t

            sudo systemctl daemon-reload
            sudo systemctl reload nginx
            sudo systemctl restart medassist-backend
            sudo systemctl restart medassist-frontend
